name: "Code"

on:
    push:
        branches:
            - "**"
        paths:
            - "**/*.py"
    pull_request:
        branches:
            - main
            - master
        paths:
            - "**/*.py"
        paths-ignore:
            - "**/*.md"
            - "**/*.rst"
            - "docs/**"
            - ".github/**"
    workflow_dispatch: {}

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    lint:
        name: "Lint (ruff)"
        runs-on: ubuntu-latest
        strategy:
            matrix:
                python-version: ["3.10", "3"]
        steps:
            - uses: actions/checkout@v6
            - uses: ./.github/actions/python-setup
              with:
                  python-version: ${{ matrix.python-version }}
                  cache-key-suffix: lint
            - name: "Run linting checks"
              run: ruff check --no-fix --config pyproject.toml --output-format=github

    formatting:
        name: "Formatting check (ruff format)"
        runs-on: ubuntu-latest
        strategy:
            matrix:
                python-version: ["3.10", "3"]
        continue-on-error: true
        steps:
            - uses: actions/checkout@v6
            - uses: ./.github/actions/python-setup
              with:
                  python-version: ${{ matrix.python-version }}
                  cache-key-suffix: fmt
            - name: "Run formatting checks"
              run: ruff format --check --config pyproject.toml

    unit-test:
        name: "Unit tests"
        runs-on: ubuntu-latest
        strategy:
            matrix:
                python-version: ["3.10", "3"]
        steps:
            - uses: actions/checkout@v6
            - uses: ./.github/actions/python-setup
              with:
                  python-version: ${{ matrix.python-version }}
                  cache-key-suffix: unittest
            - name: "Run tests"
              run: |
                  echo "PYTHONPATH=./src"
                  export PYTHONPATH=./src
                  python -m unittest -v ./tests/test_*.py
