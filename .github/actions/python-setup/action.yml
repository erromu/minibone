name: "Python setup & dependency cache"
description: "Install Python, pip and dependencies with modern caching best practices"

inputs:
    python-version:
        description: "Python version (e.g. 3.10, 3.11, or 3.x)"
        required: true
        default: "3.10"
    requirements-file:
        description: "Optional path to a requirements file"
        required: false
        default: ""
    pip-packages:
        description: "Optional list of additional pip packages"
        required: false
        default: "ruff aiofiles pyyaml httpx tomlkit build twine"
    cache-key-suffix:
        description: "Legacy suffix for cache key (kept for backward compatibility)"
        required: false
        default: ""

runs:
    using: composite
    steps:
        - name: Setup Python with pip cache
          uses: actions/setup-python@v5
          with:
              python-version: ${{ inputs.python-version }}
              cache: "pip"
              cache-dependency-path: "${{ inputs.requirements-file }}"

        - name: Upgrade pip, setuptools, wheel
          shell: bash
          run: python -m pip install --upgrade pip setuptools wheel

        - name: Install dependency packages
          shell: bash
          run: |
              set -euo pipefail

              if [[ -n "${{ inputs.requirements-file }}" ]]; then
                  python -m pip install --requirement "${{ inputs.requirements-file }}"
              fi

              if [[ -n "${{ inputs.pip-packages }}" ]]; then
                  python -m pip install ${{ inputs.pip-packages }}
              fi

        - name: (Legacy) apply cache-key-suffix hint
          shell: bash
          if: ${{ inputs.cache-key-suffix != '' }}
          run: |
              echo "Cache key suffix is set to '${{ inputs.cache-key-suffix }}'." 
              echo "actions/setup-python cache is used; this is only a metadata hint."
